apiVersion: apps/v1
kind: Deployment
metadata:
  name: kovalent-noisy-errors
  namespace: default
  labels:
    app.kubernetes.io/name: kovalent-noisy-errors
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kovalent-noisy-errors
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kovalent-noisy-errors
        app: kovalent-noisy-errors
    spec:
      containers:
        - name: noisy-errors
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                echo "ERROR checkout failed for order $i"
                echo "exception payment timeout request_id=$i"
                echo "connection refused to dependency orders-db"
                i=$((i + 1))
                sleep 2
              done
          resources:
            requests:
              cpu: 20m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
