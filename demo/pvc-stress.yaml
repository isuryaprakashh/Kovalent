apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kovalent-pvc-stress-data
  namespace: default
  labels:
    app.kubernetes.io/name: kovalent-pvc-stress
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kovalent-pvc-stress
  namespace: default
  labels:
    app.kubernetes.io/name: kovalent-pvc-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kovalent-pvc-stress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kovalent-pvc-stress
        app: kovalent-pvc-stress
    spec:
      containers:
        - name: pvc-writer
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                dd if=/dev/zero of=/data/write-test.bin bs=1M count=64 conv=fsync
                rm -f /data/write-test.bin
                sleep 2
              done
          volumeMounts:
            - name: stress-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 128Mi
      volumes:
        - name: stress-data
          persistentVolumeClaim:
            claimName: kovalent-pvc-stress-data
