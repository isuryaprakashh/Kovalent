apiVersion: apps/v1
kind: Deployment
metadata:
  name: kovalent-cpu-spike
  namespace: default
  labels:
    app.kubernetes.io/name: kovalent-cpu-spike
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kovalent-cpu-spike
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kovalent-cpu-spike
        app: kovalent-cpu-spike
    spec:
      containers:
        - name: cpu-spike
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                i=0
                while [ $i -lt 250000 ]; do
                  i=$((i + 1))
                done
                sleep 1
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
