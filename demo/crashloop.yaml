apiVersion: apps/v1
kind: Deployment
metadata:
  name: kovalent-crashloop
  namespace: default
  labels:
    app.kubernetes.io/name: kovalent-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kovalent-crashloop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kovalent-crashloop
        app: kovalent-crashloop
    spec:
      containers:
        - name: crashloop
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "error: demo crashloop starting"
              sleep 3
              echo "failed: exiting to generate restart signals"
              exit 1
          resources:
            requests:
              cpu: 20m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
